<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A personal library website to track books already read and to read.">
    <title>Awesome Library</title>
    <link rel="stylesheet" href="../static/css/style.css">
    <script src="../static/js/script.js"></script>
</head>
<body>
    <header>
        <div class="upper-header">
            <div class="logo">
                <h1>Awesome Library</h1>
            </div>
            <div class="menu">
                <h3><a>Home</a></h3>
                <h3><a>Services</a></h3>
                <h3><a>About</a></h3>
                <h3><a>Contact us</a></h3>
            </div>
        </div>
        <div class="lower-header">
            <h3>Stats</h3>
            <h3>Store</h3>
            <div class="theme">
                <button>Night-Mode</button>
            </div>
        </div>
    </header>
    <main>
        <div class="sidebar">
            <div class="stat-card">
                <p id="book-nos">Total Books: </p>
                <p id="read">Read Books: </p>
                <p id="unread">Books To read: </p>
            </div>
        </div>
        <div class="book-container"></div>
    </main>
</body>

</html>
